# ─────────────────────────────────────────────────────────
#  CI/CD Pipeline — Test → Build → Deploy to Hetzner
#
#  Triggers on push to main branch or manual dispatch.
#  Runs tests → Builds Docker image → pushes to GHCR → deploys to server.
#
#  Required GitHub Secrets:
#    DEPLOY_SSH_KEY  — Private SSH key for root@server
#    DEPLOY_HOST     — Server IP (e.g. 178.104.35.208)
#    GHCR_PAT        — Personal Access Token with read:packages
# ─────────────────────────────────────────────────────────

name: Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/itsnilay87/claim-analytics-platform

jobs:
  # ── Stage 1: Run tests (gates deployment) ──
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fund engine dependencies
        run: pip install -r engine_fund/requirements.txt

      - name: Verify fund engine imports
        run: |
          python -c "from engine_fund.core.simulation import CashFlowModel; print('CashFlowModel OK')"
          python -c "from engine_fund.api.celery_app import celery_app; print('Celery app OK')"
          python -c "from engine_fund.api.sidecar import app; print('Sidecar app OK')"

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server API tests
        working-directory: server
        env:
          NODE_ENV: test
        run: npx vitest run

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        run: npm run build

  # ── Stage 2: Build & Deploy (only on main, after tests pass) ──
  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_PAT
          script: |
            set -e
            echo "$GHCR_PAT" | docker login ghcr.io -u itsnilay87 --password-stdin
            docker pull ghcr.io/itsnilay87/claim-analytics-platform:latest

            cd /root/claim-analytics-platform
            # Sync compose/env files from main (no embedded credentials).
            git fetch origin main
            git checkout origin/main -- deploy/docker-compose.yml deploy/nginx.conf deploy/supervisord.conf 2>/dev/null || true

            # Run prebuilt GHCR image (no local build).
            docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d --remove-orphans
            docker image prune -f
            echo "Deploy complete at $(date)"
