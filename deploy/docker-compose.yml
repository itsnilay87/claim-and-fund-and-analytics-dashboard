# ─────────────────────────────────────────────────────────
#  docker-compose.yml — alternative multi-service setup
#  Usage: docker compose -f deploy/docker-compose.yml up -d
#
#  For most deployments, the single Dockerfile is recommended.
#  Use this if you want separate containers for each concern.
# ─────────────────────────────────────────────────────────

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "80:80"
    volumes:
      - runs-data:/app/server/runs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001

volumes:
  runs-data:
