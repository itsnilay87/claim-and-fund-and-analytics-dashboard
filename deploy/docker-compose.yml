# ─────────────────────────────────────────────────────────
#  docker-compose.yml — multi-service setup with PostgreSQL
#  Usage: docker compose -f deploy/docker-compose.yml up -d
# ─────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-claim_analytics}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cap_user} -d ${POSTGRES_DB:-claim_analytics}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  web:
    # In production, pull the prebuilt image from GHCR (set WEB_IMAGE in .env).
    # For local dev, override with: docker compose -f docker-compose.yml -f docker-compose.dev.yml ...
    # or set WEB_IMAGE= (empty) and uncomment the build block below.
    image: ${WEB_IMAGE:-ghcr.io/itsnilay87/claim-analytics-platform:latest}
    # build:
    #   context: ..
    #   dockerfile: deploy/Dockerfile
    pull_policy: always
    ports:
      - "8080:80"
    volumes:
      - runs-data:/app/server/runs
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cap_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-claim_analytics}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - REDIS_URL=redis://redis:6379/0
      - FUND_SIDECAR_URL=http://localhost:8000
    networks:
      - internal
      - default

volumes:
  runs-data:
  pgdata:
  redis-data:

networks:
  internal:
    internal: true
