# ─────────────────────────────────────────────────────────
#  docker-compose.yml — multi-service setup with PostgreSQL
#  Usage: docker compose -f deploy/docker-compose.yml up -d
# ─────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-claim_analytics}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cap_user} -d ${POSTGRES_DB:-claim_analytics}"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "80:80"
    volumes:
      - runs-data:/app/server/runs
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cap_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-claim_analytics}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    networks:
      - internal
      - default

volumes:
  runs-data:
  pgdata:

networks:
  internal:
    internal: true
