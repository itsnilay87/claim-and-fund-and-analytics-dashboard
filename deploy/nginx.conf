# ─────────────────────────────────────────────────────────
#  Nginx — reverse proxy + static file server
#  Routes:  /           → app SPA
#           /dashboard/ → dashboard SPA
#           /api/       → Node Express (port 3001)
# ─────────────────────────────────────────────────────────

upstream api_server {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── API proxy ──
    location /api/ {
        proxy_pass http://api_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Dashboard SPA ──
    location /dashboard/ {
        alias /app/static/dashboard/;
        try_files $uri $uri/ /dashboard/index.html;

        # Hashed assets are immutable and safe to cache aggressively
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # index.html must NEVER be cached — it points to hashed assets
        location = /dashboard/index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            expires off;
        }
    }

    # ── Main app SPA (catch-all) ──
    location / {
        root /app/static/app;
        try_files $uri $uri/ /index.html;

        # Hashed assets are immutable and safe to cache aggressively
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # index.html must NEVER be cached — it references the hashed bundle.
        # Without this, browsers keep loading old JS bundles after a deploy.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            expires off;
        }
    }

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
